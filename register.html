<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Register - Digital Earners</title>
  <link rel="icon" href="logo.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #e0e5ec;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      touch-action: pan-y pan-x;
    }

    .container {
      background: #e0e5ec;
      width: 100%;
      max-width: 450px;
      padding: 40px 25px;
      border-radius: 35px;
      box-shadow: 10px 10px 20px #a3b1c6, -10px -10px 20px #ffffff;
      animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      width: 90px;
      height: 90px;
      margin: 0 auto 15px;
      background: #e0e5ec;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 45px;
      box-shadow: 8px 8px 15px #a3b1c6, -8px -8px 15px #ffffff;
    }

    .header h2 {
      font-size: 28px;
      font-weight: 800;
      color: #1a237e;
      text-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #1a237e;
      font-weight: 600;
      font-size: 15px;
      text-shadow: 1px 1px 2px #ffffff;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 20px;
      font-size: 16px;
      background: #e0e5ec;
      box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
      transition: 0.3s;
      color: #333;
    }

    .input-group input:focus {
      outline: none;
      box-shadow: inset 7px 7px 15px #a3b1c6, inset -7px -7px 15px #ffffff;
    }

    .input-group input.error {
      box-shadow: inset 5px 5px 10px #ffb3b3, inset -5px -5px 10px #ffffff;
      border: 2px solid #ff6b6b;
    }

    .eye-btn {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #1a237e;
      font-size: 20px;
      background: #e0e5ec;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
    }

    .eye-btn:active {
      box-shadow: inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff;
    }

    .get-sponsor {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: #1a237e;
      cursor: pointer;
      font-weight: 600;
      padding: 8px 15px;
      border-radius: 30px;
      background: #e0e5ec;
      box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
      white-space: nowrap;
    }

    .get-sponsor:active {
      box-shadow: inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff;
    }

    .error-text {
      color: #ff4757;
      font-size: 13px;
      margin-top: 5px;
      margin-left: 15px;
      font-weight: 600;
      display: none;
    }

    .btn-register {
      width: 100%;
      background: #e0e5ec;
      border: none;
      padding: 18px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 800;
      color: #1a237e;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 8px 8px 15px #a3b1c6, -8px -8px 15px #ffffff;
      transition: 0.3s;
      margin-top: 30px;
    }

    .btn-register:hover {
      box-shadow: 10px 10px 20px #a3b1c6, -10px -10px 20px #ffffff;
    }

    .btn-register:active {
      box-shadow: inset 8px 8px 15px #a3b1c6, inset -8px -8px 15px #ffffff;
    }

    .login-text {
      margin-top: 25px;
      font-size: 15px;
      color: #333;
      text-shadow: 1px 1px 2px #ffffff;
    }

    .login-text a {
      color: #1a237e;
      text-decoration: none;
      font-weight: 700;
      margin-left: 5px;
      padding: 5px 10px;
      border-radius: 20px;
      background: #e0e5ec;
      box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
    }

    .login-text a:active {
      box-shadow: inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff;
    }

    .email-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #e0e5ec;
      border-radius: 15px;
      margin-top: 5px;
      padding: 10px;
      box-shadow: 5px 5px 10px #a3b1c6, -5px -5px 10px #ffffff;
      z-index: 10;
      display: none;
    }

    .email-suggestions.show {
      display: block;
    }

    .suggestion-item {
      padding: 10px 15px;
      border-radius: 10px;
      margin: 5px 0;
      cursor: pointer;
      transition: 0.2s;
      color: #1a237e;
      font-weight: 500;
    }

    .suggestion-item:hover {
      background: #d1d9e6;
      box-shadow: inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff;
    }

    #loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .loader {
      width: 60px;
      height: 60px;
      background: #e0e5ec;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 8px 8px 15px #a3b1c6, -8px -8px 15px #ffffff;
      animation: pulse 1.5s infinite;
    }

    .loader div {
      width: 40px;
      height: 40px;
      border: 4px solid #1a237e;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .success {
      animation: successPulse 1.5s infinite;
    }

    @keyframes successPulse {
      0% { box-shadow: 0 0 0 0 rgba(26, 35, 126, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(26, 35, 126, 0); }
      100% { box-shadow: 0 0 0 0 rgba(26, 35, 126, 0); }
    }
  </style>
</head>
<body>

<div class="container">
  
  <div class="header">
    <div class="logo">👤</div>
    <h2>Register With Us</h2>
    <div class="subtitle">Zero Investment • Lifetime Free</div>
  </div>

  <div class="input-group">
    <input type="text" id="name" placeholder="Full Name" pattern="[A-Za-z\s]+">
    <div id="nameError" class="error-text"></div>
  </div>

  <div class="input-group">
    <input type="tel" id="mobile" placeholder="Mobile Number" maxlength="10">
    <div id="mobileError" class="error-text"></div>
  </div>

  <div class="input-group">
    <input type="email" id="email" placeholder="Email ID" autocomplete="off">
    <div id="emailError" class="error-text"></div>
    <div class="email-suggestions" id="emailSuggestions"></div>
  </div>

  <div class="input-group">
    <input type="password" id="pass" placeholder="Password">
    <span class="eye-btn" onclick="togglePass('pass')">👁️</span>
    <div id="passError" class="error-text"></div>
  </div>

  <div class="input-group">
    <input type="password" id="cpass" placeholder="Confirm Password">
    <span class="eye-btn" onclick="togglePass('cpass')">👁️</span>
    <div id="cpassError" class="error-text"></div>
  </div>

  <div class="input-group">
    <input type="text" id="sponsor" placeholder="Sponsor ID">
    <span class="get-sponsor" onclick="getSponsor()">Get Sponsor ID</span>
    <div id="sponsorError" class="error-text"></div>
  </div>

  <button id="regBtn" class="btn-register">CREATE ACCOUNT</button>

  <div class="login-text">
    Already have an account?<a href="login.html">Login</a>
  </div>

</div>

<div id="loading">
  <div class="loader">
    <div></div>
  </div>
</div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

  const supabaseUrl = "https://clbasxqamthvxrtnuqht.supabase.co"
  const supabaseKey = "sb_publishable_TQ1uOFcqdY2hOdONCmwUtw_ZfqysYAe"
  const supabase = createClient(supabaseUrl, supabaseKey)

  // ✅ New Sponsor ID
  const FIXED_SPONSOR_ID = "DGTENSH73@"

  // Toggle Password Visibility
  window.togglePass = (id) => {
    const input = document.getElementById(id)
    input.type = input.type === "password" ? "text" : "password"
  }

  // ✅ Get Sponsor ID - WhatsApp Link
  window.getSponsor = () => {
    window.open("https://wa.me/917217392800", "_blank")
  }

  // Show Error Function
  function showError(inputId, errorId, message) {
    const input = document.getElementById(inputId)
    const error = document.getElementById(errorId)
    
    input.classList.add('error')
    error.textContent = message
    error.style.display = 'block'
    
    input.scrollIntoView({ behavior: 'smooth', block: 'center' })
    
    setTimeout(() => {
      input.classList.remove('error')
      error.style.display = 'none'
    }, 3000)
  }

  // Validate Name
  function validateName(name) {
    const re = /^[A-Za-z\s]+$/
    return re.test(name)
  }

  // Validate Email
  function validateEmail(email) {
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
    return re.test(email)
  }

  // Validate Mobile
  function validateMobile(mobile) {
    const re = /^[6-9]\d{9}$/
    return re.test(mobile)
  }

  // ✅ Email Auto-fill - @ ke baad directly gmail.com
  const emailInput = document.getElementById('email')
  const suggestionsBox = document.getElementById('emailSuggestions')

  emailInput.addEventListener('input', function() {
    const value = this.value
    const atIndex = value.indexOf('@')
    
    if (atIndex !== -1) {
      const localPart = value.substring(0, atIndex)
      const domainPart = value.substring(atIndex + 1)
      
      // ✅ @ lagte hi gmail.com suggest karo
      if (domainPart.length === 0) {
        suggestionsBox.innerHTML = ''
        const div = document.createElement('div')
        div.className = 'suggestion-item'
        div.textContent = localPart + '@gmail.com'
        div.onclick = () => {
          emailInput.value = localPart + '@gmail.com'
          suggestionsBox.classList.remove('show')
        }
        suggestionsBox.appendChild(div)
        suggestionsBox.classList.add('show')
      } 
      // Agar kuch type kar raha hai to matching domains dikhao
      else if (domainPart.length > 0) {
        const domains = ['gmail.com', 'yahoo.com', 'outlook.com', 'hotmail.com', 'rediffmail.com']
        const matchedDomains = domains.filter(d => d.startsWith(domainPart))
        
        if (matchedDomains.length > 0) {
          suggestionsBox.innerHTML = ''
          matchedDomains.forEach(domain => {
            const div = document.createElement('div')
            div.className = 'suggestion-item'
            div.textContent = localPart + '@' + domain
            div.onclick = () => {
              emailInput.value = localPart + '@' + domain
              suggestionsBox.classList.remove('show')
            }
            suggestionsBox.appendChild(div)
          })
          suggestionsBox.classList.add('show')
        } else {
          suggestionsBox.classList.remove('show')
        }
      }
    } else {
      suggestionsBox.classList.remove('show')
    }
  })

  // Hide suggestions on outside click
  document.addEventListener('click', function(e) {
    if (!emailInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
      suggestionsBox.classList.remove('show')
    }
  })

  // Remove error on focus
  document.querySelectorAll('input').forEach(input => {
    input.addEventListener('focus', function() {
      this.classList.remove('error')
      const errorId = this.id + 'Error'
      const errorEl = document.getElementById(errorId)
      if (errorEl) {
        errorEl.style.display = 'none'
      }
    })

    // Name validation
    if (input.id === 'name') {
      input.addEventListener('input', function() {
        if (!validateName(this.value) && this.value.length > 0) {
          this.classList.add('error')
          document.getElementById('nameError').textContent = 'Only letters and spaces allowed'
          document.getElementById('nameError').style.display = 'block'
        } else {
          this.classList.remove('error')
          document.getElementById('nameError').style.display = 'none'
        }
      })
    }
  })

  // Main Register Function
  document.getElementById("regBtn").addEventListener("click", async () => {
    
    const name = document.getElementById("name").value.trim()
    const mobile = document.getElementById("mobile").value.trim()
    const email = document.getElementById("email").value.trim()
    const pass = document.getElementById("pass").value
    const cpass = document.getElementById("cpass").value
    const sponsor = document.getElementById("sponsor").value.trim()

    // Name Validation
    if (!name) {
      showError('name', 'nameError', 'Please enter your full name')
      return
    }
    if (!validateName(name)) {
      showError('name', 'nameError', 'Name can only contain letters and spaces')
      return
    }

    // Mobile Validation
    if (!mobile) {
      showError('mobile', 'mobileError', 'Please enter mobile number')
      return
    }
    if (!validateMobile(mobile)) {
      showError('mobile', 'mobileError', 'Enter a valid 10-digit Indian mobile number')
      return
    }

    // Email Validation
    if (!email) {
      showError('email', 'emailError', 'Please enter email address')
      return
    }
    if (!validateEmail(email)) {
      showError('email', 'emailError', 'Enter a valid email address (e.g., name@gmail.com)')
      return
    }

    // Password Validation
    if (!pass) {
      showError('pass', 'passError', 'Please enter password')
      return
    }
    if (pass.length < 6) {
      showError('pass', 'passError', 'Password must be at least 6 characters')
      return
    }

    // Confirm Password
    if (!cpass) {
      showError('cpass', 'cpassError', 'Please confirm your password')
      return
    }
    if (pass !== cpass) {
      showError('cpass', 'cpassError', 'Passwords do not match')
      return
    }

    // ✅ Sponsor ID Validation with new ID
    if (!sponsor) {
      showError('sponsor', 'sponsorError', 'Please enter sponsor ID')
      return
    }
    if (sponsor !== FIXED_SPONSOR_ID) {
      showError('sponsor', 'sponsorError', 'Invalid Sponsor ID')
      return
    }

    // Show loading
    document.getElementById("loading").style.display = "flex"

    try {
      const { data, error } = await supabase.auth.signUp({
        email: email,
        password: pass,
        options: {
          data: {
            full_name: name,
            mobile: mobile
          }
        }
      })

      if (error) {
        alert(error.message)
      } else {
        localStorage.setItem('hasAccount', 'true')
        window.location.replace("dashboard.html")
      }
    } catch (e) {
      alert("Something went wrong. Please try again.")
    }

    document.getElementById("loading").style.display = "none"
  })
</script>

<script type="module" src="auth-check.js"></script>
</body>
</html>
