<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Earner Community</title>

<style>
body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8faff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

.container { 
  background: white; 
  width: 90%; 
  max-width: 400px; 
  padding: 40px 25px; 
  border-radius: 25px; 
  box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
  text-align: center; 
  animation: smoothSlideIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  opacity: 0;
}

@keyframes smoothSlideIn {
  0% {opacity:0; transform:translateY(60px); filter:blur(4px);}
  60% {opacity:0.7; filter:blur(2px);}
  100% {opacity:1; transform:translateY(0); filter:blur(0);}
}

.title-group { display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:5px;}
.title-group h2 { color:#1a237e; margin:0; font-size:24px; font-weight:800;}
.title-group span { font-size:28px; color:#3f51b5;}
.subtitle { color:#52c41a; font-weight:600; font-size:14px; margin-bottom:30px;}

.input-group { position:relative; margin-bottom:15px;}
.input-group input { width:100%; padding:16px; border:1.5px solid #e2e8f0; border-radius:12px; font-size:16px; box-sizing:border-box; color:#333; transition:0.3s;}
.input-group input:focus { outline:none; border-color:#3f51b5;}

.eye-btn { position:absolute; right:15px; top:50%; transform:translateY(-50%); cursor:pointer; color:#94a3b8; font-size:18px;}

.btn-register { width:100%; background-color:#283593; color:white; border:none; padding:18px; border-radius:12px; font-size:16px; font-weight:bold; text-transform:uppercase; letter-spacing:1px; margin-top:20px; cursor:pointer;}

.login-text { margin-top:25px; font-size:14px; color:#64748b;}
.login-text a { color:#3f51b5; text-decoration:none; font-weight:700;}

.error-input { border-color:#dc3545 !important;}
.error-text { color:#dc3545; font-size:12px; margin-top:5px; text-align:left; display:none; margin-left:5px;}

.get-sponsor { position:absolute; right:10px; top:50%; transform:translateY(-50%); font-size:12px; color:#3f51b5; cursor:pointer; text-decoration:underline;}

#loading { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); justify-content:center; align-items:center; z-index:1000;}
#loading div { width:50px;height:50px;border:5px solid #ccc;border-top:5px solid #283593;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin {0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
</style>

</head>
<body>

<div class="container">

<div class="title-group">
<span>👤⁺</span>
<h2>Register With Us</h2>
</div>

<div class="subtitle">No investment needed</div>

<div class="input-group">
<input type="text" id="name" placeholder="Full Name">
<div id="nameError" class="error-text"></div>
</div>

<div class="input-group">
<input type="tel" id="mobile" placeholder="Mobile Number">
<div id="mobileError" class="error-text"></div>
</div>

<div class="input-group">
<input type="text" id="email" placeholder="Email ID">
<div id="emailError" class="error-text"></div>
</div>

<div class="input-group">
<input type="password" id="pass" placeholder="Password">
<span class="eye-btn" onclick="togglePass('pass')">👁️</span>
</div>

<div class="input-group">
<input type="password" id="cpass" placeholder="Confirm Password">
<span class="eye-btn" onclick="togglePass('cpass')">👁️</span>
<div id="passError" class="error-text"></div>
</div>

<div class="input-group">
<input type="text" id="sponsor" placeholder="Sponsor ID">
<div id="sponsorError" class="error-text"></div>
<span class="get-sponsor" onclick="getSponsor()">Get Sponsor ID</span>
</div>

<button id="regBtn" class="btn-register">REGISTER</button>

<div class="login-text">
Already have an account? <a href="login.html">Login</a>
</div>

</div>

<div id="loading"><div></div></div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabaseUrl = "https://clbasxqamthvxrtnuqht.supabase.co"
const supabaseKey = "sb_publishable_TQ1uOFcqdY2hOdONCmwUtw_ZfqysYAe"

const supabase = createClient(supabaseUrl, supabaseKey)

window.togglePass = (id)=>{
const input=document.getElementById(id)
input.type=(input.type==="password")?"text":"password"
}

window.getSponsor = ()=>{
window.open("https://wa.me/917217392800","_blank")
}

const FIXED_SPONSOR_ID="MYSECRETID"

document.getElementById("regBtn").addEventListener("click",async()=>{

const name=document.getElementById("name")
const mobile=document.getElementById("mobile")
const email=document.getElementById("email")
const pass=document.getElementById("pass")
const cpass=document.getElementById("cpass")
const sponsor=document.getElementById("sponsor")

if(pass.value!==cpass.value){
alert("Passwords do not match")
return
}

if(sponsor.value!==FIXED_SPONSOR_ID){
alert("Invalid Sponsor ID")
return
}

document.getElementById("loading").style.display="flex"

try{

const {data,error}=await supabase.auth.signUp({
email:email.value,
password:pass.value
})

if (error) {
  alert(error.message)
} else {
  localStorage.setItem('hasAccount', 'true')
  window.location.replace("dashboard.html")
}

}catch(e){

alert("Something went wrong")

}

document.getElementById("loading").style.display="none"

})

</script>

<script type="module" src="auth-check.js"></script>

</body>
