<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Earner Community</title>

<style>
body { 
font-family: 'Segoe UI', Tahoma, sans-serif; 
background-color: #f8faff; 
margin: 0; 
display: flex; 
justify-content: center; 
align-items: center; 
min-height: 100vh; 
}

.container { 
background: white; 
width: 90%; 
max-width: 400px; 
padding: 40px 25px; 
border-radius: 20px; 
box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
text-align: center; 
position: relative; 
animation: smoothSlideIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
opacity: 0;
}

@keyframes smoothSlideIn {
0% {opacity:0; transform:translateY(60px); filter:blur(4px);}
60% {opacity:0.7; filter:blur(2px);}
100% {opacity:1; transform:translateY(0); filter:blur(0);}
}

.title-group { display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:25px; font-size:20px; color:#1a237e; font-weight:700;}
.title-group img { width:40px; height:40px; object-fit:contain;}

.input-group { position:relative; margin-bottom:15px; text-align:left;}
.input-group input { width:100%; padding:15px; border:1.5px solid #e2e8f0; border-radius:10px; font-size:15px; box-sizing:border-box; transition:0.3s;}
.input-group input:focus { outline:none; border-color:#3f51b5; box-shadow:0 0 0 3px rgba(63,81,181,0.15);}

.error-text { color:#dc3545; font-size:12px; margin-top:5px; display:none; margin-left:5px;}

.eye-icon { position:absolute; right:15px; top:50%; transform:translateY(-50%); cursor:pointer; color:#718096;}

.checkbox-group { text-align:left; margin:10px 0; font-size:14px; color:#4a5568; display:flex; align-items:center; gap:8px;}

.forgot-link { display:block; text-align:left; margin-bottom:20px; font-size:14px; color:#1a237e; font-weight:600; text-decoration:underline; cursor:pointer;}

.btn-login { width:100%; background-color:#3f51b5; color:white; border:none; padding:15px; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; margin-bottom:20px; transition:0.3s;}
.btn-login:hover { background-color:#303f9f; transform:translateY(-2px);}

.register-footer { font-size:14px; color:#718096;}
.register-footer a { color:#3f51b5; font-weight:700; text-decoration:none;}

#forgotModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;}
#forgotModal .modal-content { background:white; padding:25px; border-radius:15px; width:90%; max-width:400px; text-align:center; position:relative;}
#forgotModal h3 { margin-bottom:15px; color:#1a237e;}
#forgotModal input { width:100%; padding:12px; border:1.5px solid #e2e8f0; border-radius:10px; font-size:14px; box-sizing:border-box;}
#forgotModal .modal-btn { margin-top:15px; padding:12px 20px; background-color:#3f51b5; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:600;}
#forgotModal .close-btn { position:absolute; top:10px; right:15px; cursor:pointer; font-weight:bold; font-size:18px; color:#718096;}
#forgotModal .success-text { color:#52c41a; font-size:13px; margin-top:10px; display:none;}
</style>

</head>
<body>

<div class="container">

<div class="title-group">
<img src="logo.png">
<span>Login Account</span>
</div>

<div class="input-group">
<input type="text" id="email" placeholder="Email ID">
<div id="emailError" class="error-text"></div>
</div>

<div class="input-group">
<input type="password" id="pass" placeholder="Password">
<span class="eye-icon" onclick="togglePass()">👁️</span>
<div id="passError" class="error-text"></div>
</div>

<div class="checkbox-group">
<input type="checkbox" id="remember"> <label for="remember">Remember me</label>
</div>

<span class="forgot-link" id="forgotBtn">Forgot Password?</span>

<button id="loginBtn" class="btn-login">LOGIN</button>

<div class="register-footer">
Don't have an account? <a href="register.html">Register</a>
</div>

</div>

<div id="forgotModal">
<div class="modal-content">
<span class="close-btn" id="closeModal">×</span>
<h3>Enter your registered email address</h3>
<input type="text" id="forgotEmail" placeholder="Email ID">
<div id="forgotError" class="error-text"></div>
<button class="modal-btn" id="forgotSubmit">Send Reset Link</button>
<div class="success-text" id="forgotSuccess">Reset link sent to your email.</div>
</div>
</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabaseUrl = "https://clbasxqamthvxrtnuqht.supabase.co"
const supabaseKey = "sb_publishable_TQ1uOFcqdY2hOdONCmwUtw_ZfqysYAe"

const supabase = createClient(supabaseUrl, supabaseKey)

window.togglePass = ()=>{
const p=document.getElementById("pass")
p.type=(p.type==="password")?"text":"password"
}

const emailInput=document.getElementById("email")
const passInput=document.getElementById("pass")

document.getElementById("loginBtn").addEventListener("click",async()=>{

if(emailInput.value===""||passInput.value===""){
alert("Enter Email and Password")
return
}

const {data,error}=await supabase.auth.signInWithPassword({
email:emailInput.value,
password:passInput.value
})

if(error){
alert(error.message)
}else{
window.location.replace("dashboard.html")
}

})

const forgotModal=document.getElementById("forgotModal")
const forgotBtn=document.getElementById("forgotBtn")
const closeModal=document.getElementById("closeModal")
const forgotEmail=document.getElementById("forgotEmail")
const forgotSubmit=document.getElementById("forgotSubmit")
const forgotSuccess=document.getElementById("forgotSuccess")

forgotBtn.onclick=()=>{forgotModal.style.display="flex"}
closeModal.onclick=()=>{forgotModal.style.display="none"}

forgotSubmit.onclick=async()=>{

const {error}=await supabase.auth.resetPasswordForEmail(forgotEmail.value)

if(error){
alert(error.message)
}else{
forgotSuccess.style.display="block"
}

}

window.onclick=(e)=>{if(e.target===forgotModal) forgotModal.style.display="none"}

</script>

<script type="module" src="auth-check.js"></script>

</body>
</html>
