<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - Digital Earners</title>
  <link rel="icon" href="logo.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #e0e5ec;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      touch-action: pan-y pan-x;
    }

    .container {
      background: #e0e5ec;
      width: 100%;
      max-width: 450px;
      padding: 40px 25px;
      border-radius: 35px;
      box-shadow: 10px 10px 20px #a3b1c6, -10px -10px 20px #ffffff;
      animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      width: 90px;
      height: 90px;
      margin: 0 auto 15px;
      background: #e0e5ec;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 45px;
      box-shadow: 8px 8px 15px #a3b1c6, -8px -8px 15px #ffffff;
    }

    .header h2 {
      font-size: 28px;
      font-weight: 800;
      color: #1a237e;
      text-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #1a237e;
      font-weight: 600;
      font-size: 15px;
      text-shadow: 1px 1px 2px #ffffff;
      margin-bottom: 10px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 20px;
      font-size: 16px;
      background: #e0e5ec;
      box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
      transition: 0.3s;
      color: #333;
    }

    .input-group input:focus {
      outline: none;
      box-shadow: inset 7px 7px 15px #a3b1c6, inset -7px -7px 15px #ffffff;
    }

    .input-group input.error {
      box-shadow: inset 5px 5px 10px #ffb3b3, inset -5px -5px 10px #ffffff;
      border: 2px solid #ff6b6b;
    }

    .eye-icon {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #1a237e;
      font-size: 20px;
      background: #e0e5ec;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
    }

    .eye-icon:active {
      box-shadow: inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff;
    }

    .error-text {
      color: #ff4757;
      font-size: 13px;
      margin-top: 5px;
      margin-left: 15px;
      font-weight: 600;
      display: none;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 15px 0;
      color: #333;
      font-size: 15px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #1a237e;
    }

    .forgot-link {
      display: block;
      text-align: right;
      margin: 10px 0 20px;
      color: #1a237e;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      padding: 5px 10px;
      border-radius: 30px;
      background: #e0e5ec;
      box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
      width: fit-content;
      float: right;
    }

    .forgot-link:active {
      box-shadow: inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff;
    }

    .btn-login {
      width: 100%;
      background: #e0e5ec;
      border: none;
      padding: 18px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 800;
      color: #1a237e;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 8px 8px 15px #a3b1c6, -8px -8px 15px #ffffff;
      transition: 0.3s;
      margin: 30px 0 20px;
    }

    .btn-login:hover {
      box-shadow: 10px 10px 20px #a3b1c6, -10px -10px 20px #ffffff;
    }

    .btn-login:active {
      box-shadow: inset 8px 8px 15px #a3b1c6, inset -8px -8px 15px #ffffff;
    }

    .register-footer {
      text-align: center;
      font-size: 15px;
      color: #333;
      text-shadow: 1px 1px 2px #ffffff;
    }

    .register-footer a {
      color: #1a237e;
      text-decoration: none;
      font-weight: 700;
      margin-left: 5px;
      padding: 5px 10px;
      border-radius: 20px;
      background: #e0e5ec;
      box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
    }

    .register-footer a:active {
      box-shadow: inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff;
    }

    /* Email Suggestions */
    .email-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #e0e5ec;
      border-radius: 15px;
      margin-top: 5px;
      padding: 10px;
      box-shadow: 5px 5px 10px #a3b1c6, -5px -5px 10px #ffffff;
      z-index: 10;
      display: none;
    }

    .email-suggestions.show {
      display: block;
    }

    .suggestion-item {
      padding: 10px 15px;
      border-radius: 10px;
      margin: 5px 0;
      cursor: pointer;
      transition: 0.2s;
      color: #1a237e;
      font-weight: 500;
    }

    .suggestion-item:hover {
      background: #d1d9e6;
      box-shadow: inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff;
    }

    /* Forgot Password Modal */
    #forgotModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .modal-content {
      background: #e0e5ec;
      padding: 30px;
      border-radius: 30px;
      width: 90%;
      max-width: 400px;
      box-shadow: 10px 10px 20px #a3b1c6, -10px -10px 20px #ffffff;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 35px;
      height: 35px;
      background: #e0e5ec;
      border: none;
      border-radius: 50%;
      color: #ff4757;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn:active {
      box-shadow: inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff;
    }

    .modal-content h3 {
      color: #1a237e;
      font-size: 20px;
      margin-bottom: 20px;
      text-align: center;
    }

    .modal-content input {
      width: 100%;
      padding: 15px 20px;
      border: none;
      border-radius: 20px;
      font-size: 16px;
      background: #e0e5ec;
      box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
      margin-bottom: 20px;
    }

    .modal-content input:focus {
      outline: none;
      box-shadow: inset 7px 7px 15px #a3b1c6, inset -7px -7px 15px #ffffff;
    }

    .modal-btn {
      width: 100%;
      background: #e0e5ec;
      border: none;
      padding: 15px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 700;
      color: #1a237e;
      cursor: pointer;
      box-shadow: 5px 5px 10px #a3b1c6, -5px -5px 10px #ffffff;
    }

    .modal-btn:active {
      box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
    }

    .success-text {
      color: #10b981;
      font-size: 14px;
      margin-top: 15px;
      text-align: center;
      display: none;
    }

    #loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .loader {
      width: 60px;
      height: 60px;
      background: #e0e5ec;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 8px 8px 15px #a3b1c6, -8px -8px 15px #ffffff;
      animation: pulse 1.5s infinite;
    }

    .loader div {
      width: 40px;
      height: 40px;
      border: 4px solid #1a237e;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="container">
  
  <div class="header">
    <div class="logo">🔐</div>
    <h2>Login Account</h2>
    <div class="subtitle">Welcome Back!</div>
  </div>

  <div class="input-group">
    <input type="email" id="email" placeholder="Email ID" autocomplete="off">
    <div id="emailError" class="error-text"></div>
    <div class="email-suggestions" id="emailSuggestions"></div>
  </div>

  <div class="input-group">
    <input type="password" id="pass" placeholder="Password">
    <span class="eye-icon" onclick="togglePass()">👁️</span>
    <div id="passError" class="error-text"></div>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center;">
    <div class="checkbox-group">
      <input type="checkbox" id="remember">
      <label for="remember">Remember me</label>
    </div>
    <span class="forgot-link" id="forgotBtn">Forgot Password?</span>
  </div>

  <button id="loginBtn" class="btn-login">LOGIN</button>

  <div class="register-footer">
    Don't have an account? <a href="register.html">Register</a>
  </div>

</div>

<!-- Forgot Password Modal -->
<div id="forgotModal">
  <div class="modal-content">
    <button class="close-btn" id="closeModal">✕</button>
    <h3>Reset Password</h3>
    <input type="email" id="forgotEmail" placeholder="Enter registered email">
    <div id="forgotError" class="error-text"></div>
    <button class="modal-btn" id="forgotSubmit">Send Reset Link</button>
    <div class="success-text" id="forgotSuccess">✓ Reset link sent to your email</div>
  </div>
</div>

<!-- Loading Animation -->
<div id="loading">
  <div class="loader">
    <div></div>
  </div>
</div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

  const supabaseUrl = "https://clbasxqamthvxrtnuqht.supabase.co"
  const supabaseKey = "sb_publishable_TQ1uOFcqdY2hOdONCmwUtw_ZfqysYAe"
  const supabase = createClient(supabaseUrl, supabaseKey)

  // Toggle Password Visibility
  window.togglePass = () => {
    const p = document.getElementById("pass")
    p.type = p.type === "password" ? "text" : "password"
  }

  // Show Error Function
  function showError(inputId, errorId, message) {
    const input = document.getElementById(inputId)
    const error = document.getElementById(errorId)
    
    input.classList.add('error')
    error.textContent = message
    error.style.display = 'block'
    
    input.scrollIntoView({ behavior: 'smooth', block: 'center' })
    
    setTimeout(() => {
      input.classList.remove('error')
      error.style.display = 'none'
    }, 3000)
  }

  // Validate Email
  function validateEmail(email) {
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
    return re.test(email)
  }

  // Email Auto-suggestions
  const emailInput = document.getElementById('email')
  const suggestionsBox = document.getElementById('emailSuggestions')

  emailInput.addEventListener('input', function() {
    const value = this.value
    const atIndex = value.indexOf('@')
    
    if (atIndex !== -1) {
      const localPart = value.substring(0, atIndex)
      const domainPart = value.substring(atIndex + 1)
      
      if (domainPart.length === 0) {
        suggestionsBox.innerHTML = ''
        const div = document.createElement('div')
        div.className = 'suggestion-item'
        div.textContent = localPart + '@gmail.com'
        div.onclick = () => {
          emailInput.value = localPart + '@gmail.com'
          suggestionsBox.classList.remove('show')
        }
        suggestionsBox.appendChild(div)
        suggestionsBox.classList.add('show')
      } else {
        const domains = ['gmail.com', 'yahoo.com', 'outlook.com', 'hotmail.com', 'rediffmail.com']
        const matchedDomains = domains.filter(d => d.startsWith(domainPart))
        
        if (matchedDomains.length > 0) {
          suggestionsBox.innerHTML = ''
          matchedDomains.forEach(domain => {
            const div = document.createElement('div')
            div.className = 'suggestion-item'
            div.textContent = localPart + '@' + domain
            div.onclick = () => {
              emailInput.value = localPart + '@' + domain
              suggestionsBox.classList.remove('show')
            }
            suggestionsBox.appendChild(div)
          })
          suggestionsBox.classList.add('show')
        } else {
          suggestionsBox.classList.remove('show')
        }
      }
    } else {
      suggestionsBox.classList.remove('show')
    }
  })

  // Hide suggestions on outside click
  document.addEventListener('click', function(e) {
    if (!emailInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
      suggestionsBox.classList.remove('show')
    }
  })

  // Remove error on focus
  document.querySelectorAll('input').forEach(input => {
    input.addEventListener('focus', function() {
      this.classList.remove('error')
      const errorId = this.id + 'Error'
      const errorEl = document.getElementById(errorId)
      if (errorEl) {
        errorEl.style.display = 'none'
      }
    })
  })

  // Login Button Click
  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim()
    const password = document.getElementById("pass").value

    // Validation
    if (!email) {
      showError('email', 'emailError', 'Please enter your email')
      return
    }
    if (!validateEmail(email)) {
      showError('email', 'emailError', 'Enter a valid email address')
      return
    }
    if (!password) {
      showError('pass', 'passError', 'Please enter your password')
      return
    }

    // Show loading
    document.getElementById("loading").style.display = "flex"

    try {
      const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
      })

      if (error) {
        alert(error.message)
      } else {
        // If "Remember me" is checked, we can store something
        if (document.getElementById('remember').checked) {
          localStorage.setItem('rememberedEmail', email)
        }
        window.location.replace("dashboard.html")
      }
    } catch (e) {
      alert("Something went wrong. Please try again.")
    }

    document.getElementById("loading").style.display = "none"
  })

  // Forgot Password Modal
  const forgotModal = document.getElementById("forgotModal")
  const forgotBtn = document.getElementById("forgotBtn")
  const closeModal = document.getElementById("closeModal")
  const forgotEmail = document.getElementById("forgotEmail")
  const forgotSubmit = document.getElementById("forgotSubmit")
  const forgotSuccess = document.getElementById("forgotSuccess")

  forgotBtn.onclick = () => {
    forgotModal.style.display = "flex"
  }

  closeModal.onclick = () => {
    forgotModal.style.display = "none"
    forgotEmail.value = ""
    forgotSuccess.style.display = "none"
  }

  // ✅ UPDATED: Forgot Password with redirect
  forgotSubmit.onclick = async () => {
    const email = forgotEmail.value.trim()

    if (!email) {
      alert("Please enter your email")
      return
    }

    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: 'http://localhost:7700/reset-password.html'
    })

    if (error) {
      alert(error.message)
    } else {
      forgotSuccess.style.display = "block"
      setTimeout(() => {
        forgotModal.style.display = "none"
        forgotSuccess.style.display = "none"
        forgotEmail.value = ""
      }, 3000)
    }
  }

  // Close modal on outside click
  window.onclick = (e) => {
    if (e.target === forgotModal) {
      forgotModal.style.display = "none"
      forgotEmail.value = ""
      forgotSuccess.style.display = "none"
    }
  }

  // Pre-fill email if remembered
  const rememberedEmail = localStorage.getItem('rememberedEmail')
  if (rememberedEmail) {
    document.getElementById('email').value = rememberedEmail
    document.getElementById('remember').checked = true
  }
</script>

<script type="module" src="auth-check.js"></script>

</body>
</html>
